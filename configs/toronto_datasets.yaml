# Toronto Open Data (CKAN) sources for mobility ingestion.
# Portal: https://open.toronto.ca/

ckan_base_url: "https://ckan0.cf.opendata.inter.prod-toronto.ca/api/3/action/"

datasets:
  travel_times_bluetooth:
    package_id: travel-times-bluetooth
    description: Citywide Bluetooth/WiFi 5-minute travel times and route geometries
    resources:
      - name: bluetooth-routes-wgs84
        kind: geo
      - name: travel-time-readme
        kind: docs
      - name: travel-time-2014
        kind: travel_times
        year: 2014
      - name: travel-time-2015
        kind: travel_times
        year: 2015
      - name: travel-time-2016
        kind: travel_times
        year: 2016
      - name: travel-time-2017
        kind: travel_times
        year: 2017

  king_st_bluetooth_segments:
    package_id: king-st-transit-pilot-bluetooth-travel-time-segments
    description: King Street pilot Bluetooth segment geometries
    resources:
      - name: bluetooth-travel-time-segments-geojson
        kind: geo
      - name: bluetooth-travel-time-segments-wgs84
        kind: geo
      - name: bluetooth-travel-time-segments-readme
        kind: docs

  king_st_bluetooth_travel_times:
    package_id: king-st-transit-pilot-detailed-bluetooth-travel-time
    description: King Street pilot detailed 5-minute Bluetooth travel times
    resources:
      - name: detailed-bluetooth-travel-time-2017
        kind: travel_times
        year: 2017
      - name: detailed-bluetooth-travel-time-2018
        kind: travel_times
        year: 2018
      - name: detailed-bluetooth-travel-time-readme
        kind: docs

# Environment and Climate Change Canada historical climate.
# Portal: https://climate.weather.gc.ca/
# Station page (Toronto City): climate_id=6158355
weather:
  provider: eccc
  dataset_key: weather_toronto_city
  description: Hourly observations for TORONTO CITY (Climate ID 6158355)
  bulk_data_url: "https://climate.weather.gc.ca/climate_data/bulk_data_e.html"
  climate_id: "6158355"
  station_name: TORONTO CITY
  province: ON
  timeframe: 1  # 1 = hourly, 2 = daily, 3 = monthly
  # Aligned with citywide Bluetooth travel-time coverage.
  start_year: 2014
  end_year: 2017
  format: csv